services:

  postgres:

    image: postgres:17

    container_name: fraudshield_db

    environment:

      POSTGRES_DB: fraudshield_db

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: Pranav@2003

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U postgres -d fraudshield_db"]

      interval: 5s

      timeout: 5s

      retries: 5

  backend:

    build: ./backend

    container_name: fraudshield_backend

    ports:

      - "8000:8000"

    depends_on:

      postgres:

        condition: service_healthy

    env_file:

      - ./backend/.env

    environment:

      - DB_HOST=postgres

  frontend:

    build: ./frontend

    container_name: fraudshield_frontend

    ports:

      - "5173:80"

    depends_on:

      - backend

volumes:

  postgres_data: